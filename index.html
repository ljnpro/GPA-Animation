<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>GPA 双模式动态演示</title>
  <script>
    (function(){
      // Detect mobile: touch device + narrow screen, or mobile user agent
      var isMobile = false;
      
      // Check screen width
      if (window.innerWidth <= 768) {
        isMobile = true;
      }
      
      // Also check user agent for mobile devices
      var ua = navigator.userAgent || navigator.vendor || window.opera;
      if (/android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini|mobile|tablet/i.test(ua)) {
        isMobile = true;
      }
      
      // Check touch capability + small screen as additional signal
      if (('ontouchstart' in window || navigator.maxTouchPoints > 0) && window.innerWidth <= 1024) {
        isMobile = true;
      }

      // iPad detection (iPadOS reports as desktop Safari)
      if (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1) {
        isMobile = true;
      }
      
      // Redirect
      var base = window.location.href.replace(/\/[^\/]*$/, '/');
      if (isMobile) {
        window.location.replace(base + 'mobile.html');
      } else {
        window.location.replace(base + 'desktop.html');
      }
    })();
  </script>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
      background: linear-gradient(160deg, #f6f8ff, #eef3ff);
      color: rgba(31, 42, 68, 0.6);
    }
    .loading {
      text-align: center;
      font-size: 14px;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <noscript>
    <p>Please enable JavaScript to use the GPA Calculator.</p>
    <p><a href="desktop.html">Desktop Version</a> | <a href="mobile.html">Mobile Version</a></p>
  </noscript>
  <div class="loading">Loading...</div>
</body>
</html>
