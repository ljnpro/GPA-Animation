<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPA 双模式动态演示</title>
  <style>
    :root {
      --bg: #f5f8ff;
      --bg-soft: #eef3ff;
      --card: rgba(255, 255, 255, 0.82);
      --line: #dbe4f4;
      --text: #24324d;
      --muted: #7b8ca9;
      --primary: #7c9bff;
      --primary-soft: #dfe8ff;
      --accent: #8de0c7;
      --shadow: 0 18px 44px rgba(98, 122, 178, 0.16);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, #ffffff 0%, rgba(255,255,255,0) 34%),
        radial-gradient(circle at 92% 0%, #f7fbff 0%, rgba(255,255,255,0) 35%),
        linear-gradient(160deg, var(--bg), var(--bg-soft));
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .app {
      width: min(1060px, 100%);
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      padding: clamp(14px, 3vw, 30px);
      animation: elevate .7s ease;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 4vw, 34px);
      letter-spacing: .4px;
    }

    .subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
    }

    .switch {
      position: relative;
      display: inline-flex;
      background: #edf2ff;
      border: 1px solid #d9e3ff;
      border-radius: 999px;
      padding: 4px;
      min-width: 236px;
    }

    .switch .indicator {
      position: absolute;
      left: 4px;
      top: 4px;
      width: calc(50% - 4px);
      height: calc(100% - 8px);
      border-radius: 999px;
      background: linear-gradient(135deg, #b8c8ff, #9ee8d4);
      transition: transform .55s cubic-bezier(.22,1,.36,1), box-shadow .4s ease;
      box-shadow: 0 10px 24px rgba(124, 155, 255, .3);
    }

    body[data-mode="unweighted"] .indicator {
      transform: translateX(100%);
      box-shadow: 0 10px 24px rgba(141, 224, 199, .35);
    }

    .switch button {
      flex: 1;
      position: relative;
      z-index: 1;
      border: none;
      background: transparent;
      color: #30466f;
      font-weight: 700;
      padding: 9px 14px;
      border-radius: 999px;
      cursor: pointer;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin: 12px 0 16px;
    }

    .metric {
      padding: 12px;
      border-radius: 14px;
      background: rgba(255,255,255,.78);
      border: 1px solid var(--line);
      transform: translateY(8px);
      opacity: 0;
      animation: rise .5s ease forwards;
    }

    .metric:nth-child(2){ animation-delay: .08s; }
    .metric:nth-child(3){ animation-delay: .16s; }

    .metric .label { color: var(--muted); font-size: 12px; }
    .metric .value { margin-top: 5px; font-size: clamp(20px,3vw,30px); font-weight: 800; }

    .table-wrap {
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: auto;
      background: rgba(255,255,255,.7);
    }

    table {
      width: 100%;
      min-width: 740px;
      border-collapse: collapse;
    }

    th, td {
      padding: 11px 10px;
      text-align: center;
      border-bottom: 1px solid #eaf0fc;
      font-size: 14px;
    }

    th {
      font-size: 12px;
      color: #5f7398;
      letter-spacing: .4px;
      background: #f6f9ff;
    }

    tbody tr {
      opacity: 0;
      transform: translateX(-14px);
      animation: rowIn .45s ease forwards;
    }

    .changed {
      color: #ff7794;
      font-weight: 800;
      animation: pulseIn .7s cubic-bezier(.175,.885,.32,1.275);
      display: inline-block;
    }

    .grid {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,.76);
      padding: 12px;
    }

    .panel h3 {
      margin: 0 0 8px;
      color: #3f5477;
      font-size: 15px;
      font-weight: 700;
    }

    .steps {
      display: grid;
      gap: 6px;
    }

    .step {
      font-size: 13px;
      color: #2f4365;
      border-left: 3px solid var(--primary);
      background: #f8fbff;
      border-radius: 8px;
      padding: 7px 9px;
      opacity: 0;
      transform: translateY(6px);
      animation: stepIn .35s ease forwards;
    }

    .step.add { border-left-color: var(--accent); }

    .summary {
      margin-top: 14px;
      border-radius: 16px;
      border: 1px solid #d8e3fb;
      background: linear-gradient(140deg, #eef4ff, #ecfff8);
      padding: 14px;
      text-align: center;
      opacity: 0;
      transform: scale(.96);
      animation: pop .6s cubic-bezier(.175,.885,.32,1.275) forwards;
    }

    .summary .title { color: var(--muted); font-size: 12px; }
    .summary .gpa { margin-top: 6px; font-size: clamp(26px, 4vw, 40px); font-weight: 900; }
    .summary .detail { margin-top: 4px; color: #5d7499; font-size: 13px; }

    @media (max-width: 900px) {
      .metrics { grid-template-columns: 1fr; }
      .grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 620px) {
      body { padding: 8px; }
      .app { border-radius: 16px; padding: 12px; }
      .switch { min-width: 210px; }
      .switch button { font-size: 12px; padding: 8px 10px; }
      th, td { font-size: 12px; padding: 9px 7px; }
    }

    @keyframes elevate { from { opacity: .4; transform: translateY(10px);} to {opacity:1; transform:none;} }
    @keyframes rise { to { opacity: 1; transform: translateY(0);} }
    @keyframes rowIn { to { opacity: 1; transform: translateX(0);} }
    @keyframes stepIn { to { opacity: 1; transform: translateY(0);} }
    @keyframes pulseIn { from { opacity: 0; transform: scale(1.5);} to { opacity: 1; transform: scale(1);} }
    @keyframes pop { to { opacity: 1; transform: scale(1);} }
  </style>
</head>
<body data-mode="weighted">
  <main class="app" id="app">
    <div class="topbar">
      <div>
        <h1>GPA 双模式计算</h1>
        <div class="subtitle">简约淡色风格 · Weighted / Unweighted 都可视化</div>
      </div>
      <div class="switch" aria-label="模式切换">
        <div class="indicator"></div>
        <button data-mode="weighted">Weighted</button>
        <button data-mode="unweighted">Unweighted</button>
      </div>
    </div>

    <section class="metrics">
      <div class="metric"><div class="label">当前模式</div><div class="value" id="modeName">Weighted</div></div>
      <div class="metric"><div class="label">总权重 / 学分</div><div class="value" id="totalUnits">32</div></div>
      <div class="metric"><div class="label">Cumulative GPA</div><div class="value" id="gpaVal">3.10</div></div>
    </section>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>课程名称</th>
            <th>成绩分数</th>
            <th>对应 GPA</th>
            <th id="unitsHeader">课程权重</th>
            <th id="contribHeader">加权得分</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>

    <section class="grid">
      <article class="panel">
        <h3 id="mulTitle">乘法步骤</h3>
        <div class="steps" id="mulSteps"></div>
      </article>
      <article class="panel">
        <h3 id="addTitle">加法步骤</h3>
        <div class="steps" id="addSteps"></div>
      </article>
    </section>

    <section class="summary" id="summary">
      <div class="title" id="sumTitle">Weighted 结果</div>
      <div class="gpa" id="sumGpa">3.10</div>
      <div class="detail" id="sumDetail">总分: 99.28 ÷ 总权重: 32</div>
    </section>
  </main>

  <script>
    const courses = [
      ["EAP 英语", 89.68, 3.33, 4],
      ["Literature 文学", 86.41, 3.00, 4],
      ["Chinese 语文", 97.02, 4.33, 2],
      ["Microeconomics 经济", 84.99, 3.00, 4],
      ["Physics 1 物理", 79.74, 2.33, 4],
      ["Pre Finance 金融", 85.86, 3.00, 4],
      ["Calculus AB 微积分", 78.98, 2.33, 4],
      ["Drama 戏剧", 87.05, 3.33, 2],
      ["Seminar", 94.17, 4.00, 4]
    ];

    const rows = document.getElementById('rows');
    const mulSteps = document.getElementById('mulSteps');
    const addSteps = document.getElementById('addSteps');

    const modeName = document.getElementById('modeName');
    const totalUnits = document.getElementById('totalUnits');
    const gpaVal = document.getElementById('gpaVal');
    const unitsHeader = document.getElementById('unitsHeader');
    const contribHeader = document.getElementById('contribHeader');
    const sumTitle = document.getElementById('sumTitle');
    const sumGpa = document.getElementById('sumGpa');
    const sumDetail = document.getElementById('sumDetail');
    const summary = document.getElementById('summary');

    const app = document.getElementById('app');

    function n(v) { return Number(v).toFixed(2); }

    function render(mode = 'weighted') {
      const weighted = mode === 'weighted';
      document.body.dataset.mode = mode;

      app.animate(
        [{ opacity: 0.65, transform: 'translateY(8px)' }, { opacity: 1, transform: 'translateY(0)' }],
        { duration: 420, easing: 'cubic-bezier(.22,1,.36,1)' }
      );

      const units = courses.map(c => (weighted ? c[3] : 1));
      const contrib = courses.map((c, i) => c[2] * units[i]);
      const sumContrib = contrib.reduce((a, b) => a + b, 0);
      const sumUnits = units.reduce((a, b) => a + b, 0);
      const gpa = sumContrib / sumUnits;

      modeName.textContent = weighted ? 'Weighted' : 'Unweighted';
      totalUnits.textContent = String(sumUnits);
      gpaVal.textContent = n(gpa);
      sumGpa.textContent = n(gpa);

      unitsHeader.textContent = weighted ? '课程权重' : '课程学分(全=1)';
      contribHeader.textContent = weighted ? '加权得分' : '课程贡献分';
      sumTitle.textContent = weighted ? 'Weighted 结果' : 'Unweighted 结果';
      sumDetail.textContent = `总分: ${n(sumContrib)} ÷ 总${weighted ? '权重' : '学分'}: ${sumUnits}`;

      rows.innerHTML = '';
      mulSteps.innerHTML = '';
      addSteps.innerHTML = '';

      courses.forEach((c, idx) => {
        const tr = document.createElement('tr');
        tr.style.animationDelay = `${0.10 + idx * 0.08}s`;

        const changed = weighted && (idx === 2 || idx === 7);
        tr.innerHTML = `
          <td>${c[0]}</td>
          <td>${n(c[1])}</td>
          <td>${n(c[2])}</td>
          <td>${changed ? `<span class="changed">${units[idx]}</span>` : units[idx]}</td>
          <td>${n(contrib[idx])}</td>
        `;
        rows.appendChild(tr);

        const mul = document.createElement('div');
        mul.className = 'step';
        mul.style.animationDelay = `${0.5 + idx * 0.08}s`;
        mul.textContent = `${idx + 1}. ${n(c[2])} × ${units[idx]} = ${n(contrib[idx])}`;
        mulSteps.appendChild(mul);
      });

      let partial = 0;
      contrib.forEach((v, idx) => {
        const add = document.createElement('div');
        add.className = 'step add';
        add.style.animationDelay = `${1.2 + idx * 0.09}s`;
        add.textContent = `${idx + 1}. ${n(partial)} + ${n(v)} = ${n(partial + v)}`;
        partial += v;
        addSteps.appendChild(add);
      });

      summary.style.animation = 'none';
      void summary.offsetWidth;
      summary.style.animation = 'pop .6s cubic-bezier(.175,.885,.32,1.275) 2.15s forwards';
    }

    document.querySelectorAll('.switch button').forEach(btn => {
      btn.addEventListener('click', () => render(btn.dataset.mode));
    });

    render('weighted');
  </script>
</body>
</html>
